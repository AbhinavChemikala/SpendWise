name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    # 🔥 GLOBAL ENV (fixes your issue)
    env:
      SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 4. Decode Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $SIGNING_STORE_FILE

      # 5. Debug ENV (optional - remove later)
      - name: Debug ENV
        run: |
          echo "Alias: $SIGNING_KEY_ALIAS"
          echo "Store file: $SIGNING_STORE_FILE"

      # 6. Verify Keystore (optional - first run only)
      - name: Verify Keystore
        run: |
          keytool -list -v \
          -keystore $SIGNING_STORE_FILE \
          -alias $SIGNING_KEY_ALIAS \
          -storepass $SIGNING_STORE_PASSWORD

      # 7. Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 8. Build Release APK (SIGNED)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 9. 🔥 Get SHA-1 used in build
      - name: Print Signing Report
        run: ./gradlew signingReport

      # 10. Upload APK to GitHub Release
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: SpendWise v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          body: |
            Auto build from push to main
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
